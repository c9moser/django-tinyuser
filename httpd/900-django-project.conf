<VirtualServer *:80>
        # Set the server name if any, otherwise Apache will complain about it and use the IP address instead, which may cause issues with some applications.
        # ServerName <your-domain-or-ip-address>
        # ServerAlias <your-domain-or-ip-address>

    DocumentRoot /var/www/html
    Indexes Off
    Options -Indexes +FollowSymLinks

    ALIAS $MEDIA_URL "$MEDIA_ROOT"
    ALIAS $STATIC_URL "$STATIC_ROOT"
    ALIAS /favicon.png "$STATIC_ROOT/img/favicon.png"
    ALIAS /favicon.ico "$STATIC_ROOT/img/favicon.ico"
    ALIAS /favicon.svg "$STATIC_ROOT/img/favicon.svg"
    ALIAS /robots.txt "$STATIC_ROOT/robots.txt"

    <Directory "$MEDIA_ROOT">
        Require all granted
        AllowOverride All
    </Directory>
    <Directory "$STATIC_ROOT">
        Require all granted
    </Directory>

    <Directory /app/django_project>
        <FilesMatch "^(auth_)?wsgi.py">
            Require all granted
        </FilesMatch>
        Require all denied
    </Directory>

    WSGIDaemonProcess django-project python-home=/venv python-path=/app/django_project
    WSGIProcessGroup django-project
    WSGIScriptAlias / /app/django_project/wsgi.py
    WSGIApplicationGroup %{GLOBAL}

    <IfModule mod_ssl.c>
        RewriteEngine On
        # Change "ServerName" to your domain name if you are not using localhost
        RewriteCond %{SERVER_NAME} = loaclhost
        RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,L,NE,R=permanent]
        RewriteRule ^ https://%{SERVER_ADDR}%{REQUEST_URI} [END,L,NE,R=permanent]
    </IfModule>
</VirtualServer>

<IfModule mod_ssl.c>
    <VirtualServer *:443>        DocumentRoot /var/www/html
        Indexes Off
        Options -Indexes +FollowSymLinks

        ALIAS $MEDIA_URL "$MEDIA_ROOT"
        ALIAS $STATIC_URL "$STATIC_ROOT"
        ALIAS /favicon.png "$STATIC_ROOT/img/favicon.png"
        ALIAS /favicon.ico "$STATIC_ROOT/img/favicon.ico"
        ALIAS /favicon.svg "$STATIC_ROOT/img/favicon.svg"
        ALIAS /robots.txt "$STATIC_ROOT/robots.txt"

        <Directory "$MEDIA_ROOT">
            Require all granted
            AllowOverride All

            AuthType form
            AuthName "Restricted Access"
            #AuthFormProvider wsgi
            #AuthFormLoginRequiredLocation /accounts/a2login
            #AuthFormLogoutLocation /accounts/a2logout
            #AuthUserScript $BASE_DIR/django_project/a2auth_wsgi.py
            #AuthGroupScript $BASE_DIR/django_project/a2auth_wsgi.py
            #Require valid-user
            #Require wsgi-group members
        </Directory>
        <Directory "$STATIC_ROOT">
            Require all granted
        </Directory>

        <Directory /app/django_project>
            <FilesMatch "^(auth_)?wsgi.py">
                Require all granted
            </FilesMatch>
            Require all denied
        </Directory>

        WSGIDaemonProcess django-project python-home=/venv python-path=/app/django_project
        WSGIProcessGroup django-project
        WSGIScriptAlias / /app/django_project/wsgi.py
        WSGIApplicationGroup %{GLOBAL}


        SSLCertificateFile "$SSL_CERTIFICATE_FILE"
        SSLCertificateKeyFile "$SSL_CERTIFICATE_KEY_FILE"
        Include /etc/letsencrypt/options-ssl-apache.conf
    </VirtualServer>
</IfModule>