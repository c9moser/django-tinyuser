
<VirtualServer *:HTTPS_PORT>
    DocumentRoot /var/www/html
    Indexes Off
    Options -Indexes +FollowSymLinks

    ALIAS $MEDIA_URL "$MEDIA_ROOT"
    ALIAS $STATIC_URL "$STATIC_ROOT"

    <Directory "$MEDIA_ROOT">
        Require all granted
        AllowOverride All
        # AuthName "Restricted Access"
        # AuthType form
        # AuthFormProvider wsgi
        # AuthFormLoginRequiredLocation /accounts/a2login
        # AuthFormLogoutLocation /accounts/a2logout
        # AuthUserScript $BASE_DIR/django_project/a2auth_wsgi.py
        # AuthGroupScript $BASE_DIR/django_project/a2auth_wsgi.py

        require valid-user
    </Directory>
    <Directory "$STATIC_ROOT">
        Require all granted
    </Directory>

    <Directory "$BASE_DIR/django_project">
        <FilesMatch "^(auth_)?wsgi.py">
            Require all granted
        </FilesMatch>
        Require all denied
    </Directory>

    WSGIDaemonProcess django-project-ssl python-home=/venv python-path=$BASE_DIR/django_project
    WSGIProcessGroup django-project-ssl
    WSGIScriptAlias / "$BASE_DIR/django_project/wsgi.py"
    WSGIApplicationGroup %{GLOBAL}

    SSLCertificateFile $APACHE_SSL_CERTIFICATE_FILE
    SSLCertificateKeyFile $APACHE_SSL_CERTIFICATE_KEY_FILE
    Include /etc/apache2/options-ssl.conf
</VirtualServer>
