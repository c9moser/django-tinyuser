<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TinyUser{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tinyuser/css/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1><a href="{% url 'tinyuser:home' %}">TinyUser</a></h1>
        <nav>
            <ul>
                <li><a href="{# url 'tinyuser:home' #}">Home</a></li>
                <li><a href="{% url 'account_register' %}">Register</a></li>
                <li><a href="{% url 'account_login' %}">Login</a></li>
                <li><a href="{% url 'tinyuser:profile' %}">Profile</a></li>
                <li><a href="{% url 'account_logout' %}">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}
        <h1>Welcome to TinyUser!</h1>
        This is the base template. Extend this template for your views.
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 TinyUser. All rights reserved.</p>
    </footer>
</body>
</html>
